<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Word Cloud | 文字雲產生器</title>
    <meta name="description" content="使用 Firebase 部署的美觀、動態文字雲產生器。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 class="gradient-text">Stellar Word Cloud</h1>
            <p>將您的文字轉化為視覺藝術</p>
        </header>

        <main class="glass-panel">
            <div class="input-section">
                <label for="text-input">請輸入文字內容</label>
                <textarea id="text-input" placeholder="在這裡輸入任何中英文文章、詞彙，我們將為您產生獨一無二的文字雲..."></textarea>
                <div class="button-group">
                    <button id="generate-btn" class="primary-btn">
                        <span>產生文字雲</span>
                        <div class="btn-glow"></div>
                    </button>
                    <button id="save-btn" class="secondary-btn">
                        <span>💾 儲存到雲端</span>
                    </button>
                </div>
            </div>
            
            <div class="output-section">
                <div id="canvas-container">
                    <canvas id="word-canvas"></canvas>
                </div>
            </div>
        </main>
        
        <section class="history-section">
            <h2>☁️ 最近的雲端文字</h2>
            <div id="history-container" class="history-grid">
                <p class="loading-text">載入中...</p>
            </div>
        </section>
        
        <footer>
            <p>Powered by Firebase & GitHub 🚀</p>
        </footer>
    </div>
    
    <!-- Load wordcloud2.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
